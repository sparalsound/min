<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chan-wook Cycle System v2</title>
    <script>
        // 1. 보안 장치: F12 및 우클릭 즉시 차단
        document.addEventListener('contextmenu', e => e.preventDefault());
        setInterval(() => { (function(c){}(function(){ var s = new Date(); debugger; return new Date() - s > 100; }())) }, 1000);
        
        // 2. 시간 만료 체크 (2026-05-30)
        const _0x_v = async () => {
            const expiration = new Date("2026-05-30").getTime();
            const now = new Date().getTime();
            if (now > expiration) {
                alert("SYSTEM EXPIRED");
                document.body.innerHTML = "";
                window.location.href = "about:blank";
            }
        };
        _0x_v();
    </script>
    <style>
        /* 찬욱님의 스타일시트 (보안을 위해 한 줄로 압축) */
        :root{--bg:#000;--accent-static:#00d2ff;--accent-spiral:#ff00ff;--white:#fff;--active-key:#ffeb3b}body{font-family:-apple-system,sans-serif;background-color:var(--bg);color:#fff;margin:0;padding:0;display:flex;flex-direction:column;height:100vh;width:100vw;overflow:hidden}.header{text-align:center;padding:10px 5px;background:#111;border-bottom:2px solid #333;flex-shrink:0}.header h1{font-size:.9rem;margin:0;color:#fff;letter-spacing:1px;font-weight:900}.visualizer-container{display:flex;flex-direction:column;justify-content:flex-start;align-items:center;gap:8px;padding:10px 0;background:#000;flex-grow:1;overflow-y:auto}.canvas-wrapper{display:flex;align-items:center;width:96%;background:#0a0a0a;border-radius:12px;padding:8px;border:1px solid #333}.canvas-wrapper canvas{width:140px;height:140px;flex-shrink:0}.canvas-info{flex-grow:1;text-align:center}.canvas-label{font-size:.75rem;color:#fff;font-weight:900;border-bottom:1px solid #555;display:inline-block;padding-bottom:2px;margin-bottom:5px}.current-notes{font-size:.8rem;color:#00d2ff;font-weight:700;min-height:1.2em}.controls-area{padding:12px;background:#111;border-top:1px solid #444;flex-shrink:0;display:grid;grid-template-columns:1fr 1fr;gap:10px}.ctrl-group{display:flex;flex-direction:column;gap:4px}.ctrl-group label{font-size:.7rem;color:#aaa;font-weight:700}select{background:#fff;color:#000;border:none;padding:6px;border-radius:5px;font-size:.9rem;font-weight:700}.piano-outer{background:#000;padding:5px 4px 35px;border-top:2px solid #444;flex-shrink:0}.piano-container{position:relative;display:flex;width:100%;height:140px}.white-key{flex:1;height:100%;background:#fdfdfd;border:1px solid #999;border-radius:0 0 6px 6px;z-index:1;cursor:pointer;transition:background .1s}.white-key.active{background:var(--active-key)}.black-key{width:4.8%;height:60%;background:#000;border:1px solid #444;border-radius:0 0 4px 4px;z-index:2;position:absolute;cursor:pointer}.black-key.active{background:#ff9800}
    </style>
</head>
<body>

<div class="header"><h1>CHAN-WOOK'S 12-WEDGE CYCLE</h1></div>

<div class="visualizer-container">
    <div class="canvas-wrapper">
        <canvas id="canvas1" width="240" height="240"></canvas>
        <div class="canvas-info">
            <div class="canvas-label">ORIGINAL (IN)</div>
            <div id="notes1" class="current-notes"></div>
        </div>
    </div>
    <div class="canvas-wrapper">
        <canvas id="canvas2" width="240" height="240"></canvas>
        <div class="canvas-info">
            <div class="canvas-label">STATIC (DIST)</div>
            <div id="notes2" class="current-notes"></div>
        </div>
    </div>
    <div class="canvas-wrapper">
        <canvas id="canvas3" width="240" height="240"></canvas>
        <div class="canvas-info">
            <div class="canvas-label">SPIRAL (VEC)</div>
            <div id="notes3" class="current-notes"></div>
        </div>
    </div>
</div>

<div class="controls-area">
    <div class="ctrl-group">
        <label>AXIS (12 o'clock)</label>
        <select id="axisSelect" onchange="_0x_draw()"></select>
    </div>
    <div class="ctrl-group">
        <label>CYCLE MODE</label>
        <select id="cycleDir" onchange="_0x_draw()">
            <option value="5th">5th Cycle (CW)</option>
            <option value="4th">4th Cycle (CCW)</option>
        </select>
    </div>
</div>

<div class="piano-outer">
    <div class="piano-container" id="piano"></div>
</div>

<script>
    /* 로직 난독화 적용 */
    const _c = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];
    const _c5 = ['C', 'G', 'D', 'A', 'E', 'B', 'Gb', 'Db', 'Ab', 'Eb', 'Bb', 'F'];
    const _c4 = ['C', 'F', 'Bb', 'Eb', 'Ab', 'Db', 'Gb', 'B', 'E', 'A', 'D', 'G'];
    const _sM = {'C':'Gb','Db':'G','D':'Ab','Eb':'A','E':'Bb','F':'B','Gb':'C','G':'Db','Ab':'D','A':'Eb','Bb':'E','B':'F'};
    const _aK = new Map();

    const _aS = document.getElementById('axisSelect');
    _c.forEach(n => {
        const o = document.createElement('option'); o.value = n; o.textContent = n;
        if(n === 'Ab') o.selected = true; _aS.appendChild(o);
    });

    function _0x_sm(n, a) {
        let nI = _c.indexOf(n), aI = _c.indexOf(a);
        return _c[(_aI - (nI - aI) + 12) % 12];
    }

    function _0x_dw(id, an, cl, di) {
        const cv = document.getElementById(id);
        const ctx = cv.getContext('2d');
        const cx=120, cy=120, r=90;
        const ax = _aS.value;
        const mo = document.getElementById('cycleDir').value;
        const cc = (mo === '5th') ? _c5 : _c4;
        const ai = cc.indexOf(ax);
        const ro = -90 - (ai * 30);
        
        ctx.clearRect(0,0,240,240);
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5;
        for(let i=0; i<12; i++) {
            const ag = (i * 30 + ro - 15) * Math.PI / 180;
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + r*Math.cos(ag), cy + r*Math.sin(ag)); ctx.stroke();
        }
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();

        an.forEach(n => {
            const idx = cc.indexOf(n);
            const sa = (idx * 30 + ro - 15) * Math.PI / 180;
            const ea = (idx * 30 + ro + 15) * Math.PI / 180;
            ctx.fillStyle = cl; ctx.globalAlpha = 0.7;
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, sa, ea, false); ctx.closePath(); ctx.fill();
            ctx.globalAlpha = 1.0;
        });

        cc.forEach((n, i) => {
            const ia = an.includes(n);
            const isA = (n === ax || n === _c[(_c.indexOf(ax) + 6) % 12]);
            const ag = (i * 30 + ro) * Math.PI / 180;
            ctx.fillStyle = isA ? "#ffeb3b" : "#ffffff";
            ctx.font = ia ? "bold 16px Arial" : "12px Arial";
            ctx.textAlign="center"; ctx.textBaseline="middle";
            ctx.fillText(n, cx + (r+20)*Math.cos(ag), cy + (r+20)*Math.sin(ag));
        });
        document.getElementById(di).textContent = an.join(', ');
    }

    function _0x_draw() {
        const ax = _aS.value;
        const inN = Array.from(_aK.values());
        const stN = inN.map(n => {
            let nI = _c.indexOf(n), aI = _c.indexOf(ax);
            return _c[(aI - (nI - aI) + 12) % 12];
        });
        const spN = inN.map(n => _sM[n]);
        _0x_dw('canvas1', inN, '#ffffff', 'notes1');
        _0x_dw('canvas2', stN, '#00d2ff', 'notes2');
        _0x_dw('canvas3', spN, '#ff00ff', 'notes3');
    }

    const _ly = [{n:'C',t:'w'},{n:'Db',t:'b'},{n:'D',t:'w'},{n:'Eb',t:'b'},{n:'E',t:'w'},{n:'F',t:'w'},{n:'Gb',t:'b'},{n:'G',t:'w'},{n:'Ab',t:'b'},{n:'A',t:'w'},{n:'Bb',t:'b'},{n:'B',t:'w'}];
    let _wc = 0; const _pC = document.getElementById('piano');
    for (let i = 0; i < 2; i++) {
        _ly.forEach(it => {
            const k = document.createElement('div'); const ki = `k_${it.n}_${i}`; k.id = ki;
            if (it.t === 'w') { k.className = 'white-key'; k.onclick = () => _0x_tk(it.n, ki); _pC.appendChild(k); _wc++; }
            else { k.className = 'black-key'; k.style.left = `calc(${(_wc/14)*100}% - 2.4%)`; k.onclick = () => _0x_tk(it.n, ki); _pC.appendChild(k); }
        });
    }

    function _0x_tk(n, id) {
        const el = document.getElementById(id);
        el.classList.contains('active') ? (el.classList.remove('active'), _aK.delete(id)) : (el.classList.add('active'), _aK.set(id, n));
        _0x_draw();
    }
    _0x_draw();
</script>
</body>
</html>
