    <div id="loader">AUTHENTICATING...</div>

    (function() {
        // 1. 보안 차단 (우클릭, 소스보기)
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };

        // 2. 안티 디버깅 (개발자 도구 감지)
        setInterval(() => {
            const s = performance.now();
            debugger;
            if (performance.now() - s > 100) {
                document.body.innerHTML = "UNAUTHORIZED ACCESS";
                location.reload();
            }
        }, 1000);

            try {
                // 시간 체크 (실패 시 로컬 시간 사용)
                let nowStr;
                try {
                    const res = await fetch('https://worldtimeapi.org/api/timezone/Etc/UTC');
                    const d = await res.json();
                    nowStr = d.datetime.split('T')[0];
                } catch(e) {
                    nowStr = new Date().toISOString().split('T')[0];
                }

                if (nowStr > EXPIRE) {
                    document.getElementById('loader').innerText = "LICENSE EXPIRED.";
                    return;
                }

                // 찬욱님의 핵심 로직 (암호화됨)
                launchApp();
            } catch (err) {
                document.getElementById('loader').innerText = "CONNECTION ERROR.";
            }
        }
