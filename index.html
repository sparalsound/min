<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Protected System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { background: #000; color: #444; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        #status { font-size: 12px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="status">INITIALIZING SYSTEM...</div>

    <script>
    (function() {
        // 1. 보안 설정: 우클릭 및 단축키 차단
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };

        // 2. 안티 디버깅 트랩
        setInterval(function() {
            const s = performance.now();
            debugger; 
            if (performance.now() - s > 100) {
                document.body.innerHTML = "ACCESS DENIED";
                location.reload();
            }
        }, 500);

        // 3. 메인 보안 엔진
        async function verifyAndRun() {
            const EXPIRE = "2026-05-30";
            const statusEl = document.getElementById('status');

            try {
                const response = await fetch('https://worldtimeapi.org/api/timezone/Etc/UTC');
                const timeData = await response.json();
                const now = timeData.datetime.split('T')[0];

                if (now > EXPIRE) {
                    statusEl.innerText = "LICENSE EXPIRED.";
                    return;
                }

                // 찬욱님의 원본 코드를 암호화한 페이로드 (난독화됨)
                // 보안을 위해 이 부분은 실제 배포시 더 복잡하게 꼬아야 합니다.
                const payload = `PCFET0NUWVBFIGh0bWw+CjxodG1sIGxhbmc9ImtvIj4KPGhlYWQ+CiAgICA8bWV0YSBjaGFyc2V0PSJVVEYtOCI+CiAgICA8dGl0bGU+Q2hhbi13b29rIEN5Y2xlIFN5c3RlbSB2MjwvdGl0bGU+CiAgICA8c3R5bGU+JHtyZXBsYWNlX3dpdGhfY3NzX2xvZ2ljfTwvc3R5bGU+CjwvaGVhZD4KPGJvZHk+JHtyZXBsYWNlX3dpdGhfYm9keV9jb250ZW50fTwvYm9keT4KPC9odG1sPg==`;
                
                // 실제 찬욱님의 코드를 복원하여 주입 (메모리 상에서만 실행)
                // 테스트를 위해 직접 코드를 주입하는 대신 핵심 로직을 실행하도록 구성됨
                setTimeout(() => {
                    document.open();
                    // 찬욱님의 원본 HTML 코드를 여기에 복원 (아래는 데모용 단순 복구 로직)
                    document.write(atob("${btoa(document.documentElement.innerHTML)}")); 
                    document.close();
                }, 1000);

            } catch (err) {
                statusEl.innerText = "CONNECTION REQUIRED.";
            }
        }

        // 실행
        verifyAndRun();
    })();
    </script>
</body>
</html>
