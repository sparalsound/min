<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>26년 사업계획 vs 25년 실적 분석</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        header { text-align: center; margin-bottom: 40px; }
        h1 { color: #1a2a6c; margin-bottom: 10px; }
        .chart-wrapper { height: 450px; margin-bottom: 50px; }
        
        /* 테이블 스타일 */
        .detail-section { display: none; animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.95em; }
        th, td { padding: 12px 15px; border: 1px solid #eee; text-align: right; }
        th { background-color: #f8f9fa; color: #555; text-align: center; font-weight: 600; }
        .row-label { text-align: left; font-weight: bold; background-color: #fcfcfc; width: 30%; }
        
        /* 강조 색상 */
        .increase { color: #e74c3c; font-weight: bold; } /* 계획이 실적보다 높음 (증액) */
        .decrease { color: #3498db; font-weight: bold; } /* 계획이 실적보다 낮음 (감액) */
        .summary-box { display: flex; justify-content: space-around; margin-bottom: 30px; background: #f1f3f5; padding: 20px; border-radius: 8px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.4em; font-weight: bold; color: #1a2a6c; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📈 귀여운 민졍이의 26년 사업계획 vs 25년 실적 비교</h1>
        <p>월별 막대 그래프를 클릭하여 전년 실적 대비 상세 계획을 확인하세요.</p>
    </header>

    <div class="summary-box">
        <div class="stat-item">
            <div>25년 총 실적</div>
            <div class="stat-value">4,599,127,415</div>
        </div>
        <div class="stat-item">
            <div>26년 총 계획</div>
            <div class="stat-value">4,232,000,000</div>
        </div>
        <div class="stat-item">
            <div>전년 대비 비중</div>
            <div class="stat-value" style="color: #3498db;">92.0%</div>
        </div>
    </div>

    <div class="chart-wrapper">
        <canvas id="mainChart"></canvas>
    </div>

    <div id="detailSection" class="detail-section">
        <h3 id="selectedMonthTitle">1월 상세 비교</h3>
        <table>
            <thead>
                <tr>
                    <th>구분</th>
                    <th>25년 실적 (Base)</th>
                    <th>26년 계획 (Target)</th>
                    <th>증감액</th>
                    <th>증감률(%)</th>
                </tr>
            </thead>
            <tbody id="detailTableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    const months = ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'];
    
    // 이미지 2에서 추출한 25년 월별 실적 (TOTAL)
    const actual25 = [452317854, 356015839, 377453778, 397142311, 362763413, 414057399, 393077687, 389409657, 392227609, 367922279, 327560673, 369178916];
    
    // 이미지 1에서 추출한 26년 월별 계획 (TOTAL)
    const plan26 = [383531681, 349210358, 344148922, 336375460, 341373592, 364092427, 344050846, 339894064, 363701278, 341129789, 356001414, 368490169];

    // 차트 설정
    const ctx = document.getElementById('mainChart').getContext('2d');
    const mainChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: months,
            datasets: [
                {
                    label: '25년 실적',
                    data: actual25,
                    backgroundColor: '#bdc3c7',
                },
                {
                    label: '26년 계획',
                    data: plan26,
                    backgroundColor: '#1a2a6c',
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'top' },
                tooltip: {
                    callbacks: {
                        label: (ctx) => `${ctx.dataset.label}: ${ctx.raw.toLocaleString()}원`
                    }
                }
            },
            onClick: (event, activeElements) => {
                if (activeElements.length > 0) {
                    const idx = activeElements[0].index;
                    showDetail(idx);
                }
            }
        }
    });

    function showDetail(monthIdx) {
        const detailSection = document.getElementById('detailSection');
        const title = document.getElementById('selectedMonthTitle');
        const tbody = document.getElementById('detailTableBody');
        
        const act = actual25[monthIdx];
        const pln = plan26[monthIdx];
        const diff = pln - act;
        const rate = ((pln / act) * 100).toFixed(1);

        title.innerText = `${months[monthIdx]} 실적 대비 계획 분석`;
        
        // 상세 테이블 내용 구성 (총계 위주 예시)
        tbody.innerHTML = `
            <tr>
                <td class="row-label">총 사업비 (Total)</td>
                <td>${act.toLocaleString()}</td>
                <td>${pln.toLocaleString()}</td>
                <td class="${diff >= 0 ? 'increase' : 'decrease'}">${diff >= 0 ? '+' : ''}${diff.toLocaleString()}</td>
                <td class="${diff >= 0 ? 'increase' : 'decrease'}">${rate}%</td>
            </tr>
            <tr>
                <td class="row-label">분석 의견</td>
                <td colspan="4" style="text-align: left; color: #666;">
                    ${months[monthIdx]} 계획은 전년 실적 대비 <b>${rate}%</b> 수준으로 편성되었습니다. 
                    (전년 대비 ${diff < 0 ? '예산 절감' : '투자 확대'}형 편성)
                </td>
            </tr>
        `;

        detailSection.style.display = 'block';
        detailSection.scrollIntoView({ behavior: 'smooth' });
    }
</script>
</body>
</html>
